<section class="auth-section">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
      <h2>Crear Cuenta</h2>
      <p>Regístrate como paciente en ZAFISIO</p>
    </div>

    <div id="registro-error" class="auth-mensaje error" style="display:none;"></div>
    <div id="registro-exito" class="auth-mensaje exito" style="display:none;"></div>

    <form id="form-registro">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre <span class="requerido">*</span></label>
          <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
          <label>Apellidos <span class="requerido">*</span></label>
          <input type="text" id="reg-apellidos" placeholder="Tus apellidos" required>
        </div>

        <div class="form-group">
          <label>Email <span class="requerido">*</span></label>
          <input type="email" id="reg-email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" id="reg-telefono" placeholder="600 000 000">
        </div>

        <div class="form-group">
          <label>DNI</label>
          <input type="text" id="reg-dni" placeholder="12345678A">
        </div>

        <div class="form-group">
          <label>Fecha de nacimiento</label>
          <input type="date" id="reg-fecha">
        </div>

        <div class="form-group">
          <label>Contraseña <span class="requerido">*</span></label>
          <div class="input-password">
            <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
            <button type="button" class="toggle-password">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Repetir contraseña <span class="requerido">*</span></label>
          <div class="input-password">
            <input type="password" id="reg-password2" placeholder="Repite la contraseña" required>
            <button type="button" class="toggle-password">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>
      </div>

      <button type="submit" class="buttons auth-btn">
        <span class="material-symbols-outlined">person_add</span>
        <span>Crear Cuenta</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? 
        <a href="#login" onclick="cargarVista('login')">Inicia sesión aquí</a>
      </p>
    </div>
  </div>
</section>
