<section class="auth-section">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Iniciar Sesión</h2>
      <p>Accede a tu cuenta de ZAFISIO</p>
    </div>

    <div id="auth-error" class="auth-mensaje error" style="display:none;"></div>

    <form id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-password">
          <input type="password" id="login-password" placeholder="Tu contraseña" required>
          <button type="button" class="toggle-password">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <button type="submit" class="buttons auth-btn">
        <span class="material-symbols-outlined">login</span>
        <span>Iniciar Sesión</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? 
        <a href="#registro">Regístrate aquí</a>
      </p>
    </div>
  </div>
</section>
